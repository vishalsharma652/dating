<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ember Admin</title>
    <style>
      :root {
        --bg: #0f0f1a;
        --panel: #151528;
        --panel-2: #1b1b31;
        --border: rgba(255, 255, 255, 0.1);
        --text: #f4f4f5;
        --muted: #a1a1aa;
        --primary: #6c5ce7;
        --success: #00c853;
        --warning: #ffb300;
        --danger: #ff3b30;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      button, input, select, textarea { font: inherit; }
      button { cursor: pointer; }
      button:disabled { cursor: not-allowed; opacity: 0.65; }

      .login-page {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 16px;
      }

      .login-card, .panel, .metric, .modal {
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.04);
        border-radius: 12px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.2);
      }

      .login-card { width: 100%; max-width: 420px; padding: 28px; }
      .eyebrow {
        color: var(--primary);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }
      h1, h2, h3, p { margin: 0; }
      h1 { margin-top: 10px; font-size: 30px; }
      .muted { color: var(--muted); }

      .field { display: grid; gap: 8px; margin-top: 16px; }
      .field span { color: #d4d4d8; font-size: 14px; font-weight: 600; }
      .input, .select {
        width: 100%;
        height: 44px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        padding: 0 12px;
        outline: none;
      }
      textarea.input { min-height: 88px; padding-top: 12px; resize: vertical; }
      .input:focus, .select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.2); }

      .btn {
        min-height: 40px;
        border: 1px solid transparent;
        border-radius: 999px;
        padding: 0 16px;
        background: var(--primary);
        color: #fff;
        font-weight: 800;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      .btn.secondary { background: rgba(255,255,255,0.06); border-color: var(--border); }
      .btn.danger { background: var(--danger); }
      .btn.success { background: var(--success); color: #07120b; }
      .btn.block { width: 100%; margin-top: 22px; }

      .app { display: none; min-height: 100vh; }
      .sidebar {
        position: fixed;
        inset: 0 auto 0 0;
        z-index: 20;
        width: 280px;
        background: #121222;
        border-right: 1px solid var(--border);
        transform: translateX(-100%);
        transition: transform 180ms ease;
      }
      .sidebar.open { transform: translateX(0); }
      .sidebar-head {
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 16px;
        border-bottom: 1px solid var(--border);
      }
      .nav { padding: 12px; overflow-y: auto; height: calc(100vh - 64px); }
      .nav-group { margin: 18px 0 8px; padding: 0 12px; color: #71717a; font-size: 11px; font-weight: 800; letter-spacing: 0.16em; text-transform: uppercase; }
      .nav-btn {
        width: 100%;
        height: 42px;
        border: 1px solid transparent;
        border-radius: 10px;
        background: transparent;
        color: #d4d4d8;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 0 12px;
        text-align: left;
        font-weight: 700;
      }
      .nav-btn.active { background: var(--primary); border-color: rgba(255,255,255,0.18); color: white; box-shadow: 0 12px 30px rgba(108,92,231,0.25); }
      .nav-btn:hover:not(.active) { background: rgba(255,255,255,0.07); color: #fff; }

      .main { min-width: 0; }
      .topbar {
        position: sticky;
        top: 0;
        z-index: 10;
        min-height: 64px;
        border-bottom: 1px solid var(--border);
        background: rgba(15,15,26,0.88);
        backdrop-filter: blur(16px);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 16px;
      }
      .top-left { display: flex; align-items: center; gap: 12px; min-width: 0; }
      .hamburger { width: 42px; padding: 0; }
      .content { padding: 16px; max-width: 1600px; margin: 0 auto; }

      .notice {
        display: none;
        margin-bottom: 16px;
        border-radius: 10px;
        padding: 12px 14px;
        border: 1px solid var(--border);
      }
      .notice.success { display: block; color: #bbf7d0; background: rgba(0,200,83,0.1); border-color: rgba(0,200,83,0.3); }
      .notice.error { display: block; color: #fecaca; background: rgba(255,59,48,0.1); border-color: rgba(255,59,48,0.3); }

      .grid { display: grid; gap: 14px; }
      .metrics { grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
      .metric { padding: 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
      .metric-value { margin-top: 8px; font-family: "Roboto Mono", ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 26px; font-weight: 900; }
      .metric-icon { width: 44px; height: 44px; border-radius: 10px; display: grid; place-items: center; background: rgba(108,92,231,0.16); color: #a69cff; }

      .panel { overflow: hidden; }
      .panel-head {
        padding: 16px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }
      .panel-body { padding: 16px; }
      .toolbar { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }

      .table-wrap { overflow-x: auto; border-radius: 10px; scrollbar-color: #3f3f5a transparent; }
      table { width: 100%; min-width: 760px; border-collapse: collapse; font-size: 14px; }
      th, td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.07); text-align: left; vertical-align: middle; }
      th { color: #71717a; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; }
      td { color: #d4d4d8; }
      .actions { display: flex; flex-wrap: wrap; gap: 8px; }

      .badge {
        display: inline-flex;
        border-radius: 999px;
        padding: 4px 9px;
        font-size: 11px;
        font-weight: 900;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        border: 1px solid var(--border);
      }
      .badge.green { color: var(--success); background: rgba(0,200,83,0.12); border-color: rgba(0,200,83,0.3); }
      .badge.yellow { color: var(--warning); background: rgba(255,179,0,0.12); border-color: rgba(255,179,0,0.3); }
      .badge.red { color: var(--danger); background: rgba(255,59,48,0.12); border-color: rgba(255,59,48,0.3); }

      .form-grid { display: grid; gap: 12px; }
      .two-col { grid-template-columns: 1fr; }
      .file-input {
        min-height: 44px;
        border: 1px dashed var(--border);
        border-radius: 10px;
        background: rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #d4d4d8;
        cursor: pointer;
      }
      .file-input input { display: none; }
      .preview { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
      .preview div { height: 64px; border-radius: 8px; background-size: cover; background-position: center; }

      .empty {
        min-height: 220px;
        display: grid;
        place-items: center;
        text-align: center;
        border: 1px dashed var(--border);
        border-radius: 10px;
        background: rgba(255,255,255,0.03);
        padding: 24px;
      }
      .empty-title { margin-top: 10px; color: #71717a; font-size: 12px; font-weight: 900; letter-spacing: 0.16em; text-transform: uppercase; }

      .spinner-page, .saving-toast {
        display: none;
        align-items: center;
        gap: 12px;
      }
      .spinner {
        width: 24px;
        height: 24px;
        border: 3px solid rgba(255,255,255,0.14);
        border-top-color: var(--primary);
        border-radius: 999px;
        animation: spin 800ms linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .spinner-page {
        min-height: 280px;
        justify-content: center;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: rgba(255,255,255,0.04);
      }
      .saving-toast {
        position: fixed;
        right: 16px;
        bottom: 16px;
        z-index: 50;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--panel);
        padding: 12px 14px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        z-index: 60;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(0,0,0,0.72);
        padding: 16px;
      }
      .modal { width: 100%; max-width: 440px; padding: 20px; background: var(--panel); }
      .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 22px; }

      @media (min-width: 768px) {
        .toolbar { flex-direction: row; align-items: center; }
        .two-col { grid-template-columns: 1fr 1fr; }
        .catalog-layout { grid-template-columns: 390px 1fr; }
      }

      @media (min-width: 1024px) {
        .sidebar { transform: translateX(0); }
        .main { padding-left: 280px; }
        .hamburger, .mobile-close { display: none; }
        .topbar { padding: 12px 24px; }
        .content { padding: 24px; }
      }
    </style>
  </head>
  <body>
    <section id="loginPage" class="login-page">
      <form id="loginForm" class="login-card">
        <p class="eyebrow">Ember Admin</p>
        <h1>Sign in</h1>
        <p class="muted" style="margin-top: 8px;">Manage users, catalog, orders, wallets, and reports.</p>
        <label class="field">
          <span>Email</span>
          <input id="email" class="input" type="email" value="admin@ember.local" required />
        </label>
        <label class="field">
          <span>Password</span>
          <input id="password" class="input" type="password" value="Admin@12345" required />
        </label>
        <div id="loginError" class="notice error"></div>
        <button id="loginButton" class="btn block" type="submit">Sign In</button>
      </form>
    </section>

    <section id="app" class="app">
      <aside id="sidebar" class="sidebar">
        <div class="sidebar-head">
          <div>
            <p class="eyebrow">Ember</p>
            <strong>Admin Panel</strong>
          </div>
          <button class="btn secondary mobile-close" onclick="toggleSidebar(false)" type="button">Close</button>
        </div>
        <nav class="nav" id="nav"></nav>
      </aside>

      <main class="main">
        <header class="topbar">
          <div class="top-left">
            <button class="btn secondary hamburger" onclick="toggleSidebar(true)" type="button">☰</button>
            <div>
              <p id="moduleGroup" class="eyebrow">Overview</p>
              <h2 id="moduleTitle">Dashboard</h2>
            </div>
          </div>
          <div class="actions">
            <button class="btn secondary" onclick="loadAll()" type="button">Refresh</button>
            <button class="btn secondary" onclick="logout()" type="button">Logout</button>
          </div>
        </header>

        <div class="content">
          <div id="notice" class="notice"></div>
          <div id="loader" class="spinner-page"><div class="spinner"></div><span>Loading admin data...</span></div>
          <div id="view"></div>
        </div>
      </main>
    </section>

    <div id="savingToast" class="saving-toast"><div class="spinner"></div><span>Updating data...</span></div>

    <div id="confirmModal" class="modal-backdrop">
      <div class="modal">
        <h3 id="confirmTitle">Confirm action</h3>
        <p id="confirmDescription" class="muted" style="margin-top: 10px; line-height: 1.6;"></p>
        <div class="modal-actions">
          <button class="btn secondary" onclick="closeConfirm()" type="button">Cancel</button>
          <button id="confirmButton" class="btn danger" type="button">Confirm</button>
        </div>
      </div>
    </div>

    <script src="/admin/admin.js"></script>
  </body>
</html>
